<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lab 9</title>

  <style>
    button {
      margin: 3px;
    }

    button:hover {
      cursor: pointer;
    }

    #first-num,
    #second-num {
      width: 60px;
    }

    output {
      border: 1px solid gray;
      display: block;
      height: 18px;
      margin-top: 5px;
      padding: 5px;
      width: 240px;
    }

    main {
      width: 800px;
    }

    #error-btns {
      column-gap: 5px;
      display: flex;
      flex-wrap: wrap;
      margin-top: 30px;
      row-gap: 5px;
    }

    #error-btns>* {
      padding: 8px 2px;
      width: 122px;
    }
  </style>
</head>

<body>
  <main>
    <form>
      <fieldset>
        <legend>Error Calculator</legend>
        <input name="first-num" id="first-num" />
        <select name="operator" id="operator">
          <option>+</option>
          <option>-</option>
          <option>*</option>
          <option>/</option>
        </select>
        <input name="second-num" id="second-num" />
        <button id="calculate">Calculate</button>
        <br />
        <output></output>
      </fieldset>
    </form>

    <section id="error-btns">
      <button>Console Log</button>
      <button>Console Error</button>
      <button>Console Count</button>
      <button>Console Warn</button>
      <button>Console Assert</button>
      <button>Console Clear</button>
      <button>Console Dir</button>
      <button>Console dirxml</button>
      <button>Console Group Start</button>
      <button>Console Group End</button>
      <button>Console Table</button>
      <button>Start Timer</button>
      <button>End Timer</button>
      <button>Console Trace</button>
      <button>Trigger a Global Error</button>
    </section>
  </main>

  <script>
    let form = document.querySelector('form');
    // form.addEventListener('submit', e => {
    //   e.preventDefault();
    //   let output = document.querySelector('output');
    //   let firstNum = document.querySelector('#first-num').value;
    //   let secondNum = document.querySelector('#second-num').value;
    //   let operator = document.querySelector('#operator').value;
    //   output.innerHTML = eval(`${firstNum} ${operator} ${secondNum}`);
    // });

    class CalculatorInputError extends Error {
      constructor(message) {
        super(message);
        this.name = 'CalculatorInputError';
      }
    }

    form.addEventListener('submit', e => {
      e.preventDefault();

      let output = document.querySelector('output');

      try {
        let firstNum = document.querySelector('#first-num').value.trim();
        let secondNum = document.querySelector('#second-num').value.trim();
        let operator = document.querySelector('#operator').value;

        if (firstNum === '' || secondNum === '') {
          throw new CalculatorInputError('Both number fields must be filled in.');
        }

        if (isNaN(firstNum) || isNaN(secondNum)) {
          throw new CalculatorInputError('Both inputs must be valid numbers.');
        }

        firstNum = Number(firstNum);
        secondNum = Number(secondNum);

        if (operator === '/' && secondNum === 0) {
          throw new CalculatorInputError('Cannot divide by zero.');
        }

        let result;

        if (operator === '+') {
          result = firstNum + secondNum;
        } else if (operator === '-') {
          result = firstNum - secondNum;
        } else if (operator === '*') {
          result = firstNum * secondNum;
        } else if (operator === '/') {
          result = firstNum / secondNum;
        } else {
          throw new Error('Unknown operator.');
        }

        output.textContent = result;
        console.log('Calculation successful:', result);
      } catch (error) {
        output.textContent = error.message;
        console.error('Calculator error:', error);
      } finally {
        console.log('Calculator submit handler finished.');
      }
    });

    let errorBtns = Array.from(document.querySelectorAll('#error-btns > button'));

    // Start your code here
    // You may move this JS to another file if you wish
    // Global error handlers
    window.onerror = function(message, source, lineno, colno, error) {
      console.error('Global error caught with window.onerror');
      console.error('Message:', message);
      console.error('Source:', source);
      console.error('Line:', lineno);
      console.error('Column:', colno);
      console.error('Error object:', error);

      return false;
    };

    window.addEventListener('error', event => {
      console.log('Global error caught with addEventListener:', event.message);
    });

    errorBtns[0].addEventListener('click', () => {
      console.log('Console Log Demo: This is a normal log message.');
    });

    errorBtns[1].addEventListener('click', () => {
      console.error('Console Error Demo: This is an error message.');
    });

    errorBtns[2].addEventListener('click', () => {
      console.count('Console Count Demo');
    });

    errorBtns[3].addEventListener('click', () => {
      console.warn('Console Warn Demo: This is a warning message.');
    });

    errorBtns[4].addEventListener('click', () => {
      console.assert(2 + 2 === 5, 'Console Assert Demo: 2 + 2 does not equal 5.');
    });

    errorBtns[5].addEventListener('click', () => {
      console.clear();
    });

    errorBtns[6].addEventListener('click', () => {
      let firstInput = document.querySelector('#first-num');
      console.dir(firstInput);
    });

    errorBtns[7].addEventListener('click', () => {
      let formElement = document.querySelector('form');
      console.dirxml(formElement);
    });

    errorBtns[8].addEventListener('click', () => {
      console.group('Calculator Debug Group');
      console.log('First number:', document.querySelector('#first-num').value);
      console.log('Second number:', document.querySelector('#second-num').value);
      console.log('Operator:', document.querySelector('#operator').value);
    });

    errorBtns[9].addEventListener('click', () => {
      console.groupEnd();
    });

    errorBtns[10].addEventListener('click', () => {
      let calculatorExamples = [
        { expression: '10 + 5', result: 15 },
        { expression: '10 - 5', result: 5 },
        { expression: '10 * 5', result: 50 },
        { expression: '10 / 5', result: 2 }
      ];

      console.table(calculatorExamples);
    });

    errorBtns[11].addEventListener('click', () => {
      console.time('Calculation Timer');

      let total = 0;
      for (let i = 0; i < 1000000; i++) {
        total += i;
      }

      console.log('Timer started. Click End Timer to stop it.');
    });

    errorBtns[12].addEventListener('click', () => {
      console.timeEnd('Calculation Timer');
    });

    errorBtns[13].addEventListener('click', () => {
      traceOne();
    });

    function traceOne() {
      traceTwo();
    }

    function traceTwo() {
      traceThree();
    }

    function traceThree() {
      console.trace('Console Trace Demo: showing the function call stack.');
    }

    errorBtns[14].addEventListener('click', () => {
      console.log('About to trigger a global error...');

      // This intentionally causes an uncaught global error.
      nonExistentFunction();
    });

    window.TrackJS && TrackJS.install({ 
      token: "a2d5428e5ddd42b29660ba2edcfab9fc"
      // for more configuration options, see https://docs.trackjs.com
    });
  </script>

  <script src="https://cdn.trackjs.com/agent/v3/latest/t.js"></script>
</body>

</html>
